openapi: 3.0.3
info:
 title: SBI Sentinel API
 description: >
 Public REST API for **SBI Sentinel**: the Autonomous Financial Wellbeing Engine.
 Invariant: the agents propose, the customer approves, the bank executes. No route in
 this API moves money autonomously; `POST /v1/plans/{id}/approve` only enqueues a
 bank-side execution against existing SBI rails. Every PII route is consent-gated
 (DPDP) and every mutation is written to an append-only, hash-chained audit ledger.
 version: 1.4.0
 contact:
 name: SBI Sentinel Platform Team
 email: sentinel-platform@sbi.example
 license:
 name: Proprietary, SBI Sentinel (SBI Hackathon @ GFF 2026)
servers:
 - url: https://api.sentinel.sbi/v1
 description: Production (India sovereign-cloud VPC)
 - url: https://sandbox.api.sentinel.sbi/v1
 description: Sandbox

tags:
 - name: Consent
 description: DPDP consent artifacts. Required before any PII processing.
 - name: Financial Health
 description: Glass-box Financial Wellbeing Score (FWS 0-1000) and its six pillars.
 - name: Risk & Fraud
 description: Early-warning risk signals and fraud/anomaly alerts.
 - name: Plans & Recommendations
 description: Proposed intervention plans, simulations, compliance certificates, explanations.
 - name: Approvals & Execution
 description: Human-in-the-loop approval and bank-side execution status.
 - name: Agents
 description: Agent-run transparency and reasoning traces (Explainability Ledger).
 - name: Audit
 description: Append-only audit ledger (staff-only).
 - name: Notifications
 description: In-app notifications and channel preferences.
 - name: Admin
 description: Staff/admin operations (role-gated, 4-eyes on rule changes).

security:
 - oauth2: []

paths:
 # ---------------------------------------------------------------- Consent
 /consent:
 post:
 tags: [Consent]
 operationId: grantConsent
 summary: Grant a DPDP consent for one or more purposes
 parameters:
 - $ref: '#/components/parameters/IdempotencyKey'
 requestBody:
 required: true
 content:
 application/json:
 schema: { $ref: '#/components/schemas/ConsentRequest' }
 example:
 customer_id: cust_8Kd2Rj
 purposes: [wellbeing_scoring, risk_monitoring, plan_generation, execution]
 data_categories: [account_balances, transactions, loans, insurance_policies]
 retention_days: 365
 channel: yono_app
 granted_via: explicit_toggle
 responses:
 '201':
 description: Consent artifact created
 headers:
 RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Consent' }
 example:
 id: cnsnt_Qop71a
 customer_id: cust_8Kd2Rj
 purposes: [wellbeing_scoring, risk_monitoring, plan_generation, execution]
 data_categories: [account_balances, transactions, loans, insurance_policies]
 status: active
 retention_days: 365
 channel: yono_app
 granted_at: '2026-07-04T09:15:00Z'
 expires_at: '2027-07-04T09:15:00Z'
 artifact_hash: 'sha256:8f2c1b9d4e7a6c0f5b3a2d1e9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b'
 audit_ref: aud_01J8Z7Q3M6R7F0K2V9A1B3C4D5
 '400': { $ref: '#/components/responses/ValidationFailed' }
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '409': { $ref: '#/components/responses/Conflict' }
 '422': { $ref: '#/components/responses/UnprocessableEntity' }
 '429': { $ref: '#/components/responses/RateLimited' }
 get:
 tags: [Consent]
 operationId: listConsents
 summary: List the caller's consent artifacts
 parameters:
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 - name: status
 in: query
 schema: { type: string, enum: [active, expired, revoked] }
 responses:
 '200':
 description: Paginated list of consents
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/Consent' }
 page: { $ref: '#/components/schemas/Page' }
 '401': { $ref: '#/components/responses/Unauthenticated' }

 /consent/{id}:
 parameters:
 - $ref: '#/components/parameters/ConsentId'
 get:
 tags: [Consent]
 operationId: getConsent
 summary: Fetch one consent artifact
 responses:
 '200':
 description: Consent artifact
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Consent' }
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '404': { $ref: '#/components/responses/NotFound' }
 delete:
 tags: [Consent]
 operationId: revokeConsent
 summary: Revoke a consent (soft, tombstoned, emits consent.revoked)
 parameters:
 - $ref: '#/components/parameters/IdempotencyKey'
 responses:
 '200':
 description: Consent revoked
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Consent' }
 example:
 id: cnsnt_Qop71a
 customer_id: cust_8Kd2Rj
 status: revoked
 revoked_at: '2026-07-04T18:00:00Z'
 artifact_hash: 'sha256:8f2c1b9d4e7a6c0f5b3a2d1e9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b'
 audit_ref: aud_01J8ZE0P4R7T0V3X6Z9B2D5G8J1
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '404': { $ref: '#/components/responses/NotFound' }

 # ---------------------------------------------------------- Financial Health
 /customers/{id}/wellbeing-score:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Financial Health]
 operationId: getWellbeingScore
 summary: Current Financial Wellbeing Score (0-1000)
 responses:
 '200':
 description: Current FWS with band and pillar breakdown
 content:
 application/json:
 schema: { $ref: '#/components/schemas/WellbeingScore' }
 example:
 customer_id: cust_8Kd2Rj
 score: 612
 band: at_risk
 delta_30d: -18
 computed_at: '2026-07-04T06:00:12Z'
 model_version: fws-1.4.0
 evidence_ref: ev_wb_cust_8Kd2Rj_20260704
 consent_id: cnsnt_Qop71a
 pillars:
 - key: emergency_buffer
 weight: 0.20
 normalized: 0.45
 points: 90
 band: critical
 signal: { months_of_essential_spend: 2.7, target_months: 6 }
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 /customers/{id}/wellbeing-score/pillars:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Financial Health]
 operationId: getWellbeingPillars
 summary: The six FWS pillar sub-scores
 responses:
 '200':
 description: Pillar breakdown
 content:
 application/json:
 schema:
 type: object
 required: [customer_id, pillars]
 properties:
 customer_id: { type: string }
 pillars:
 type: array
 items: { $ref: '#/components/schemas/Pillar' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 /customers/{id}/wellbeing-score/history:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Financial Health]
 operationId: getWellbeingHistory
 summary: Time series of FWS
 parameters:
 - name: from
 in: query
 schema: { type: string, format: date-time }
 - name: to
 in: query
 schema: { type: string, format: date-time }
 - name: interval
 in: query
 schema: { type: string, enum: [day, week, month], default: week }
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: FWS history points
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items:
 type: object
 properties:
 at: { type: string, format: date-time }
 score: { type: integer }
 band: { $ref: '#/components/schemas/Band' }
 page: { $ref: '#/components/schemas/Page' }
 '403': { $ref: '#/components/responses/ConsentRequired' }

 # -------------------------------------------------------------- Risk & Fraud
 /customers/{id}/risks:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Risk & Fraud]
 operationId: listRisks
 summary: Active early-warning risk signals
 parameters:
 - name: severity
 in: query
 schema: { $ref: '#/components/schemas/Severity' }
 responses:
 '200':
 description: Risk signals
 content:
 application/json:
 schema:
 type: object
 required: [data]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/RiskSignal' }
 example:
 data:
 - id: risk_Ab12Cd
 customer_id: cust_8Kd2Rj
 type: emi_bounce
 probability: 0.71
 eta_days: 9
 severity: high
 description: Home-loan EMI likely to bounce next cycle.
 evidence_ref: ev_risk_cust_8Kd2Rj_emi
 detected_at: '2026-07-04T06:05:00Z'
 '403': { $ref: '#/components/responses/ConsentRequired' }

 /customers/{id}/fraud-alerts:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Risk & Fraud]
 operationId: listFraudAlerts
 summary: Open fraud / anomaly alerts
 parameters:
 - name: status
 in: query
 schema: { type: string, enum: [open, acknowledged, frozen, resolved] }
 responses:
 '200':
 description: Fraud alerts
 content:
 application/json:
 schema:
 type: object
 required: [data]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/FraudAlert' }
 '403': { $ref: '#/components/responses/ConsentRequired' }

 /customers/{id}/fraud-alerts/{alertId}/freeze:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 - name: alertId
 in: path
 required: true
 schema: { type: string }
 post:
 tags: [Risk & Fraud]
 operationId: freezeOnFraudAlert
 summary: Customer-consented freeze (hold request, does NOT move money)
 description: >
 Requests a hold on the flagged instrument/transaction via core banking. Requires
 step-up auth (token `acr`) and an idempotency key. Never debits or transfers funds.
 parameters:
 - $ref: '#/components/parameters/IdempotencyKey'
 requestBody:
 required: true
 content:
 application/json:
 schema:
 type: object
 required: [consent_id, customer_acknowledgement]
 properties:
 consent_id: { type: string, pattern: '^cnsnt_[A-Za-z0-9]+$' }
 customer_acknowledgement: { type: string }
 scope: { type: string, enum: [transaction, card, account], default: transaction }
 responses:
 '202':
 description: Freeze request accepted (enqueued to core banking)
 content:
 application/json:
 schema:
 type: object
 properties:
 alert_id: { type: string }
 status: { type: string, enum: [freeze_pending] }
 audit_ref: { type: string }
 example:
 alert_id: fraud_9zXy1Q
 status: freeze_pending
 audit_ref: aud_01J8ZF1P4R7T0V3X6Z9B2D5G8J2
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }
 '409': { $ref: '#/components/responses/Conflict' }

 # ------------------------------------------------- Plans & Recommendations
 /customers/{id}/recommendations:
 parameters:
 - $ref: '#/components/parameters/CustomerId'
 get:
 tags: [Plans & Recommendations]
 operationId: listRecommendations
 summary: Ranked open recommendations (each links to a plan)
 parameters:
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: Recommendations
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/Recommendation' }
 page: { $ref: '#/components/schemas/Page' }
 '403': { $ref: '#/components/responses/ConsentRequired' }

 /plans/{id}:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 get:
 tags: [Plans & Recommendations]
 operationId: getPlan
 summary: Full plan with 2-3 options
 responses:
 '200':
 description: Plan
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Plan' }
 example:
 id: plan_5tRk9c
 customer_id: cust_8Kd2Rj
 status: proposed
 created_at: '2026-07-04T06:06:00Z'
 expires_at: '2026-07-11T06:06:00Z'
 issue:
 type: emi_bounce
 confidence: 0.71
 evidence_ref: ev_risk_cust_8Kd2Rj_emi
 compliance_certified: true
 compliance_certificate_id: cert_9Yh2Lm
 options:
 - option_id: opt_A
 summary: Partial prepay defer by one cycle.
 projected_fws: 648
 reversible: true
 actions: [{ type: emi_defer, cycles: 1 }]
 - option_id: opt_B
 summary: Sweep 45,000 INR from fixed deposit to savings.
 projected_fws: 690
 reversible: true
 actions:
 - type: fd_partial_liquidation
 account: acct_FD_11a2
 amount: { amount: 4500000, currency: INR }
 - option_id: opt_C
 summary: Restructure SIP debit date to post-salary.
 projected_fws: 655
 reversible: true
 actions: [{ type: sip_reschedule, new_day: 3 }]
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 /plans/{id}/simulation:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 get:
 tags: [Plans & Recommendations]
 operationId: getPlanSimulation
 summary: Monte-Carlo / what-if projection per option
 responses:
 '200':
 description: Simulation
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Simulation' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 /plans/{id}/compliance-certificate:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 get:
 tags: [Plans & Recommendations]
 operationId: getComplianceCertificate
 summary: The Compliance Agent's certificate (certify/veto + rule evidence)
 responses:
 '200':
 description: Compliance certificate
 content:
 application/json:
 schema: { $ref: '#/components/schemas/ComplianceCertificate' }
 example:
 id: cert_9Yh2Lm
 plan_id: plan_5tRk9c
 decision: certify
 ruleset_version: rbi-dpdp-2026.02
 certificate_hash: 'sha256:1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b'
 evaluated_at: '2026-07-04T06:06:30Z'
 checks:
 - { rule: suitability.risk_profile_match, result: pass }
 - { rule: misselling.no_unsuitable_cross_sell, result: pass }
 - { rule: dpdp.purpose_limitation, result: pass }
 - { rule: rbi.no_autonomous_debit, result: pass }
 vetoed_options: []
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 /plans/{id}/explanation:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 get:
 tags: [Plans & Recommendations]
 operationId: getPlanExplanation
 summary: Plain-language why + evidence + reasoning trail
 responses:
 '200':
 description: Explanation
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Explanation' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }

 # -------------------------------------------------- Approvals & Execution
 /plans/{id}/approve:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 post:
 tags: [Approvals & Execution]
 operationId: approvePlan
 summary: Approve one option, enqueues bank execution (the only real-world action)
 description: >
 Requires valid plan_generation + execution consent, a non-vetoed certificate, step-up
 auth (token acr), an Idempotency-Key, and the certificate_hash the customer saw
 (optimistic lock). Returns 202 with a pending Execution; the bank rail runs async.
 security:
 - oauth2: [plans:approve]
 parameters:
 - $ref: '#/components/parameters/IdempotencyKey'
 requestBody:
 required: true
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Approval' }
 example:
 selected_option_id: opt_B
 certificate_hash: 'sha256:1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b'
 consent_id: cnsnt_Qop71a
 customer_acknowledgement: I approve executing the FD sweep as described.
 responses:
 '202':
 description: Approval accepted; execution enqueued
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Execution' }
 example:
 execution_id: exec_Zn3Qp8
 plan_id: plan_5tRk9c
 selected_option_id: opt_B
 status: pending
 rail: core_banking_fd_sweep
 estimated_settlement: '2026-07-04T12:30:00Z'
 reversible: true
 compliance_certificate_id: cert_9Yh2Lm
 audit_ref: aud_01J8ZB4K7N9Q2S5U8W1Y4A7C0E
 poll_url: /v1/executions/exec_Zn3Qp8
 actions:
 - type: fd_partial_liquidation
 account: acct_FD_11a2
 amount: { amount: 4500000, currency: INR }
 - type: credit_to_savings
 account: acct_SB_77c9
 amount: { amount: 4500000, currency: INR }
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '403': { $ref: '#/components/responses/ConsentRequired' }
 '404': { $ref: '#/components/responses/NotFound' }
 '409':
 description: Certificate changed since shown, or plan already actioned
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 '422':
 description: Plan not approvable (vetoed / expired / no certificate)
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error:
 code: plan_not_approvable
 message: Plan plan_5tRk9c was vetoed by compliance and cannot be approved.
 status: 422
 trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1
 '429': { $ref: '#/components/responses/RateLimited' }

 /plans/{id}/reject:
 parameters:
 - $ref: '#/components/parameters/PlanId'
 post:
 tags: [Approvals & Execution]
 operationId: rejectPlan
 summary: Reject the plan (optional reason)
 security:
 - oauth2: [plans:approve]
 parameters:
 - $ref: '#/components/parameters/IdempotencyKey'
 requestBody:
 required: false
 content:
 application/json:
 schema:
 type: object
 properties:
 reason: { type: string, maxLength: 500 }
 responses:
 '200':
 description: Plan rejected
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Plan' }
 '404': { $ref: '#/components/responses/NotFound' }
 '409': { $ref: '#/components/responses/Conflict' }

 /executions/{id}:
 parameters:
 - name: id
 in: path
 required: true
 schema: { type: string, pattern: '^exec_[A-Za-z0-9]+$' }
 get:
 tags: [Approvals & Execution]
 operationId: getExecution
 summary: Status of a bank-side execution
 security:
 - oauth2: [executions:read]
 responses:
 '200':
 description: Execution status
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Execution' }
 '404': { $ref: '#/components/responses/NotFound' }

 # ------------------------------------------------------------------ Agents
 /agent-runs:
 get:
 tags: [Agents]
 operationId: listAgentRuns
 summary: List agent runs
 security:
 - oauth2: [agents:read]
 parameters:
 - name: customer
 in: query
 schema: { type: string }
 - name: type
 in: query
 schema: { type: string, enum: [orchestrator, financial_health, risk, fraud, planner, simulation, compliance, explainability] }
 - name: status
 in: query
 schema: { type: string, enum: [running, succeeded, failed, escalated] }
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: Agent runs
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/AgentRun' }
 page: { $ref: '#/components/schemas/Page' }
 '401': { $ref: '#/components/responses/Unauthenticated' }

 /agent-runs/{id}/trace:
 parameters:
 - name: id
 in: path
 required: true
 schema: { type: string }
 get:
 tags: [Agents]
 operationId: getAgentRunTrace
 summary: Step-by-step LangGraph reasoning trace (no PII)
 security:
 - oauth2: [agents:read]
 responses:
 '200':
 description: Reasoning trace
 content:
 application/json:
 schema: { $ref: '#/components/schemas/AgentTrace' }
 '404': { $ref: '#/components/responses/NotFound' }

 # ------------------------------------------------------------------- Audit
 /audit:
 get:
 tags: [Audit]
 operationId: queryAudit
 summary: Query the append-only audit ledger (staff-only)
 security:
 - oauth2: [audit:read]
 parameters:
 - name: actor
 in: query
 schema: { type: string }
 - name: customer
 in: query
 schema: { type: string }
 - name: action
 in: query
 schema: { type: string }
 - name: resource_type
 in: query
 schema: { type: string }
 - name: from
 in: query
 schema: { type: string, format: date-time }
 - name: to
 in: query
 schema: { type: string, format: date-time }
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: Hash-chained audit records
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/AuditRecord' }
 page: { $ref: '#/components/schemas/Page' }
 '401': { $ref: '#/components/responses/Unauthenticated' }
 '403': { $ref: '#/components/responses/Forbidden' }

 # ----------------------------------------------------------- Notifications
 /notifications:
 get:
 tags: [Notifications]
 operationId: listNotifications
 summary: Caller's in-app notifications
 parameters:
 - name: unread_only
 in: query
 schema: { type: boolean, default: false }
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: Notifications
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items: { $ref: '#/components/schemas/Notification' }
 page: { $ref: '#/components/schemas/Page' }

 /notifications/{id}/ack:
 parameters:
 - name: id
 in: path
 required: true
 schema: { type: string }
 post:
 tags: [Notifications]
 operationId: ackNotification
 summary: Mark a notification acknowledged
 responses:
 '204': { description: Acknowledged }
 '404': { $ref: '#/components/responses/NotFound' }

 /notifications/preferences:
 get:
 tags: [Notifications]
 operationId: getNotificationPreferences
 summary: Channel preferences
 responses:
 '200':
 description: Preferences
 content:
 application/json:
 schema: { $ref: '#/components/schemas/NotificationPreferences' }
 put:
 tags: [Notifications]
 operationId: updateNotificationPreferences
 summary: Update channel preferences
 requestBody:
 required: true
 content:
 application/json:
 schema: { $ref: '#/components/schemas/NotificationPreferences' }
 responses:
 '200':
 description: Updated preferences
 content:
 application/json:
 schema: { $ref: '#/components/schemas/NotificationPreferences' }

 # ------------------------------------------------------------------- Admin
 /admin/customers:
 get:
 tags: [Admin]
 operationId: adminListCustomers
 summary: Search / list customers (tokenized)
 security:
 - oauth2: [admin]
 parameters:
 - name: q
 in: query
 schema: { type: string }
 - $ref: '#/components/parameters/Limit'
 - $ref: '#/components/parameters/Cursor'
 responses:
 '200':
 description: Customers
 content:
 application/json:
 schema:
 type: object
 required: [data, page]
 properties:
 data:
 type: array
 items:
 type: object
 properties:
 id: { type: string }
 display_name: { type: string }
 band: { $ref: '#/components/schemas/Band' }
 page: { $ref: '#/components/schemas/Page' }
 '403': { $ref: '#/components/responses/Forbidden' }

 /admin/rules:
 get:
 tags: [Admin]
 operationId: adminListRules
 summary: List active compliance rules + versions
 security:
 - oauth2: [admin]
 responses:
 '200':
 description: Rules
 content:
 application/json:
 schema:
 type: object
 properties:
 ruleset_version: { type: string }
 rules:
 type: array
 items:
 type: object
 properties:
 rule: { type: string }
 enabled: { type: boolean }
 category: { type: string, enum: [rbi, dpdp, suitability, misselling] }
 '403': { $ref: '#/components/responses/Forbidden' }

 /admin/rules/{ruleId}/toggle:
 parameters:
 - name: ruleId
