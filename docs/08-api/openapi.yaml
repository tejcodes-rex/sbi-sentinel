components:
 securitySchemes:
 oauth2:
 type: oauth2
 description: >
 OAuth2 Authorization Code + PKCE via SBI OIDC (YONO SSO for customers, enterprise IdP
 for staff). Access tokens are short-lived JWTs; approval routes require step-up auth
 (elevated `acr`). Internal service-to-service calls additionally use mTLS with SPIFFE
 identities on the mesh (not modelled here as it is not a client-facing scheme).
 flows:
 authorizationCode:
 authorizationUrl: https://id.sbi.example/oauth2/authorize
 tokenUrl: https://id.sbi.example/oauth2/token
 refreshUrl: https://id.sbi.example/oauth2/token
 scopes:
 consent:read: Read consent artifacts
 consent:write: Grant/revoke consent
 wellbeing:read: Read FWS and notifications
 risk:read: Read risk signals
 fraud:read: Read fraud alerts
 fraud:act: Request a consented fraud freeze
 plans:read: Read plans, simulations, certificates, explanations
 plans:approve: Approve or reject a plan
 executions:read: Read execution status
 agents:read: Read agent runs and traces
 audit:read: Read the audit ledger (staff)
 admin: Administrative operations (staff)

 parameters:
 CustomerId:
 name: id
 in: path
 required: true
 description: Tokenized customer ref, or `me` for the authenticated customer.
 schema: { type: string, pattern: '^(cust_[A-Za-z0-9]+|me)$' }
 ConsentId:
 name: id
 in: path
 required: true
 schema: { type: string, pattern: '^cnsnt_[A-Za-z0-9]+$' }
 PlanId:
 name: id
 in: path
 required: true
 schema: { type: string, pattern: '^plan_[A-Za-z0-9]+$' }
 IdempotencyKey:
 name: Idempotency-Key
 in: header
 required: true
 description: Client-generated UUID; the first response for a key is replayed for 24h.
 schema: { type: string, format: uuid }
 Limit:
 name: limit
 in: query
 schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
 Cursor:
 name: cursor
 in: query
 schema: { type: string }

 headers:
 RateLimitRemaining:
 description: Requests remaining in the current window.
 schema: { type: integer }

 responses:
 ValidationFailed:
 description: Request failed validation
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error:
 code: validation_failed
 message: 'purposes must contain at least one purpose.'
 status: 400
 trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1
 details:
 - { field: purposes, issue: min_items, value: '0' }
 Unauthenticated:
 description: Missing or invalid token
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: unauthenticated, message: Access token is missing or expired., status: 401, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }
 Forbidden:
 description: Authenticated but not authorized (role/scope)
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: forbidden, message: Role 'rm' cannot read the audit ledger., status: 403, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }
 ConsentRequired:
 description: No active DPDP consent for the required purpose
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error:
 code: consent_required
 message: No active DPDP consent for purpose 'plan_generation'.
 status: 403
 trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1
 details:
 - { field: purpose, issue: missing, value: plan_generation }
 NotFound:
 description: Resource not found
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: not_found, message: Resource not found., status: 404, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }
 Conflict:
 description: State conflict (duplicate / optimistic-lock / already actioned)
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: conflict, message: Compliance certificate changed since it was shown., status: 409, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }
 UnprocessableEntity:
 description: Semantically invalid (e.g. idempotency key reused with different body)
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: idempotency_key_reused, message: Idempotency-Key reused with a different request body., status: 422, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }
 RateLimited:
 description: Too many requests
 headers:
 Retry-After:
 description: Seconds until the caller may retry.
 schema: { type: integer }
 content:
 application/json:
 schema: { $ref: '#/components/schemas/Error' }
 example:
 error: { code: rate_limited, message: Rate limit exceeded., status: 429, trace_id: 01J8ZC0P4R7T0V3X6Z9B2D5G8J1 }

 schemas:
 Money:
 type: object
 description: Amount in integer minor units (paise) plus ISO-4217 currency.
 required: [amount, currency]
 properties:
 amount: { type: integer, description: Value in paise (100 paise = 1 INR). }
 currency: { type: string, enum: [INR] }

 Page:
 type: object
 required: [limit]
 properties:
 next_cursor: { type: string, nullable: true }
 limit: { type: integer }

 Band:
 type: string
 enum: [critical, at_risk, stable, thriving]

 Severity:
 type: string
 enum: [low, medium, high, critical]

 ConsentRequest:
 type: object
 required: [customer_id, purposes, data_categories]
 properties:
 customer_id: { type: string, pattern: '^cust_[A-Za-z0-9]+$' }
 purposes:
 type: array
 minItems: 1
 items:
 type: string
 enum: [wellbeing_scoring, risk_monitoring, fraud_detection, plan_generation, execution]
 data_categories:
 type: array
 minItems: 1
 items:
 type: string
 enum: [account_balances, transactions, loans, insurance_policies, investments]
 retention_days: { type: integer, minimum: 1, maximum: 3650, default: 365 }
 channel: { type: string, enum: [yono_app, web, branch, rm_console] }
 granted_via: { type: string, enum: [explicit_toggle, e_sign, otp] }

 Consent:
 type: object
 required: [id, customer_id, purposes, status, artifact_hash]
 properties:
 id: { type: string }
 customer_id: { type: string }
 purposes: { type: array, items: { type: string } }
 data_categories: { type: array, items: { type: string } }
 status: { type: string, enum: [active, expired, revoked] }
 retention_days: { type: integer }
 channel: { type: string }
 granted_at: { type: string, format: date-time }
 expires_at: { type: string, format: date-time }
 revoked_at: { type: string, format: date-time, nullable: true }
 artifact_hash: { type: string, description: SHA-256 of the signed artifact, anchored in the audit ledger. }
 audit_ref: { type: string }

 Pillar:
 type: object
 required: [key, weight, normalized, points]
 properties:
 key:
 type: string
 enum: [cashflow_resilience, emergency_buffer, debt_health, protection, wealth_growth, behavioral_hygiene]
 weight: { type: number, format: float, description: Pillar weight (0-1). }
 normalized: { type: number, format: float, minimum: 0, maximum: 1 }
 points: { type: integer, description: Contribution to the 0-1000 score. }
 band: { $ref: '#/components/schemas/Band' }
 signal: { type: object, additionalProperties: true, description: Underlying signals (glass-box). }
 evidence_ref: { type: string }

 WellbeingScore:
 type: object
 required: [customer_id, score, band, computed_at, pillars]
 properties:
 customer_id: { type: string }
 score: { type: integer, minimum: 0, maximum: 1000 }
 band: { $ref: '#/components/schemas/Band' }
 delta_30d: { type: integer }
 computed_at: { type: string, format: date-time }
 model_version: { type: string }
 pillars:
 type: array
 items: { $ref: '#/components/schemas/Pillar' }
 evidence_ref: { type: string }
 consent_id: { type: string }

 RiskSignal:
 type: object
 required: [id, type, probability, severity]
 properties:
 id: { type: string }
 customer_id: { type: string }
 type: { type: string, enum: [emi_bounce, overdraft, liquidity_crunch, npa_slide] }
 probability: { type: number, minimum: 0, maximum: 1 }
 eta_days: { type: integer }
 severity: { $ref: '#/components/schemas/Severity' }
 description: { type: string }
 evidence_ref: { type: string }
 detected_at: { type: string, format: date-time }

 FraudAlert:
 type: object
 required: [id, customer_id, severity, status]
 properties:
 id: { type: string }
 customer_id: { type: string }
 pattern: { type: string, description: e.g. upi_scam_pattern, card_not_present_anomaly }
 severity: { $ref: '#/components/schemas/Severity' }
 status: { type: string, enum: [open, acknowledged, frozen, resolved] }
 amount_at_risk: { $ref: '#/components/schemas/Money' }
 recommended_action: { type: string, enum: [freeze, verify, monitor, none] }
 evidence_ref: { type: string }
 detected_at: { type: string, format: date-time }

 PlanOption:
 type: object
 required: [option_id, summary, actions]
 properties:
 option_id: { type: string }
 summary: { type: string }
 projected_fws: { type: integer }
 reversible: { type: boolean }
 avoided_cost: { $ref: '#/components/schemas/Money' }
 actions:
 type: array
 items:
 type: object
 additionalProperties: true
 description: Structured action (e.g. fd_partial_liquidation with account + Money amount).

 Plan:
 type: object
 required: [id, customer_id, status, options]
 properties:
 id: { type: string }
 customer_id: { type: string }
 status: { type: string, enum: [proposed, approved, rejected, vetoed, expired] }
 created_at: { type: string, format: date-time }
 expires_at: { type: string, format: date-time }
 issue:
 type: object
 properties:
 type: { type: string }
 confidence: { type: number, minimum: 0, maximum: 1 }
 evidence_ref: { type: string }
 compliance_certified: { type: boolean }
 compliance_certificate_id: { type: string }
 options:
 type: array
 minItems: 2
 maxItems: 3
 items: { $ref: '#/components/schemas/PlanOption' }

 Recommendation:
 type: object
 required: [id, title, plan_id]
 properties:
 id: { type: string }
 title: { type: string }
 issue_type: { type: string }
 confidence: { type: number, minimum: 0, maximum: 1 }
 priority: { type: integer }
 plan_id: { type: string }

 Simulation:
 type: object
 required: [plan_id, options]
 properties:
 plan_id: { type: string }
 method: { type: string, enum: [monte_carlo, deterministic_whatif] }
 runs: { type: integer }
 options:
 type: array
 items:
 type: object
 properties:
 option_id: { type: string }
 projected_fws: { type: integer }
 fws_delta: { type: integer }
 p10_fws: { type: integer }
 p50_fws: { type: integer }
 p90_fws: { type: integer }
 cashflow_impact: { $ref: '#/components/schemas/Money' }
 avoided_cost: { $ref: '#/components/schemas/Money' }

 ComplianceCertificate:
 type: object
 required: [id, plan_id, decision, certificate_hash]
 properties:
 id: { type: string }
 plan_id: { type: string }
 decision: { type: string, enum: [certify, veto] }
 ruleset_version: { type: string }
 certificate_hash: { type: string }
 evaluated_at: { type: string, format: date-time }
 checks:
 type: array
 items:
 type: object
 properties:
 rule: { type: string }
 result: { type: string, enum: [pass, fail, warn] }
 detail: { type: string }
 vetoed_options: { type: array, items: { type: string } }

 Explanation:
 type: object
 required: [plan_id, plain_language]
 properties:
 plan_id: { type: string }
 plain_language: { type: string, description: Customer-facing why, RAG-grounded. }
 evidence:
 type: array
 items:
 type: object
 properties:
 ref: { type: string }
 label: { type: string }
 kind: { type: string, enum: [transaction, balance, policy, circular] }
 citations:
 type: array
 items:
 type: object
 properties:
 doc_id: { type: string }
 citation: { type: string }
 reasoning_trace_ref: { type: string, description: Pointer to the agent trace (no PII). }

 Approval:
 type: object
 required: [selected_option_id, certificate_hash, consent_id]
 properties:
 selected_option_id: { type: string }
 certificate_hash: { type: string, description: The certificate hash the customer saw (optimistic lock). }
 consent_id: { type: string, pattern: '^cnsnt_[A-Za-z0-9]+$' }
 customer_acknowledgement: { type: string }

 Execution:
 type: object
 required: [execution_id, plan_id, status]
 properties:
 execution_id: { type: string }
 plan_id: { type: string }
 selected_option_id: { type: string }
 status: { type: string, enum: [pending, executing, completed, failed, reversed] }
 rail: { type: string, description: e.g. core_banking_fd_sweep, upi, yono. }
 estimated_settlement: { type: string, format: date-time }
 settled_at: { type: string, format: date-time, nullable: true }
 reversible: { type: boolean }
 compliance_certificate_id: { type: string }
 actions:
 type: array
 items:
 type: object
 additionalProperties: true
 audit_ref: { type: string }
 poll_url: { type: string }

 AgentRun:
 type: object
 required: [id, type, status]
 properties:
 id: { type: string }
 type: { type: string, enum: [orchestrator, financial_health, risk, fraud, planner, simulation, compliance, explainability] }
 customer_id: { type: string }
 status: { type: string, enum: [running, succeeded, failed, escalated] }
 started_at: { type: string, format: date-time }
 ended_at: { type: string, format: date-time, nullable: true }
 trace_ref: { type: string }

 AgentTrace:
 type: object
 required: [run_id, steps]
 properties:
 run_id: { type: string }
 steps:
 type: array
 items:
 type: object
 properties:
 seq: { type: integer }
 agent: { type: string }
 action: { type: string, description: node / tool call / decision (no PII). }
 tool: { type: string, nullable: true }
 result_ref: { type: string, description: Tokenized pointer to the result. }
 at: { type: string, format: date-time }

 AuditRecord:
 type: object
 required: [audit_ref, action, hash, prev_hash]
 properties:
 audit_ref: { type: string }
 seq: { type: integer }
 actor:
 type: object
 properties:
 type: { type: string, enum: [customer, staff, agent, system] }
 id: { type: string }
 action: { type: string }
 resource:
 type: object
 properties:
 type: { type: string }
 id: { type: string }
 consent_id: { type: string, nullable: true }
 occurred_at: { type: string, format: date-time }
 prev_hash: { type: string }
 hash: { type: string, description: H(prev_hash || record), tamper-evident chain. }

 Notification:
 type: object
 required: [id, type, created_at]
 properties:
 id: { type: string }
 type: { type: string, enum: [plan_proposed, fraud_alert, execution_completed, score_change] }
 title: { type: string }
 body: { type: string }
 resource_ref: { type: string }
 read: { type: boolean }
 created_at: { type: string, format: date-time }

 NotificationPreferences:
 type: object
 properties:
 push: { type: boolean }
 sms: { type: boolean }
 email: { type: boolean }
 quiet_hours:
 type: object
 properties:
 start: { type: string, example: '22:00' }
 end: { type: string, example: '07:00' }

 Error:
 type: object
 required: [error]
 properties:
 error:
 type: object
 required: [code, message, status]
 properties:
 code:
 type: string
 enum:
 - validation_failed
 - unauthenticated
 - forbidden
 - consent_required
 - not_found
 - conflict
 - idempotency_key_reused
 - plan_not_approvable
 - compliance_veto
 - rate_limited
 - internal_error
 - upstream_unavailable
 message: { type: string }
 status: { type: integer }
 trace_id: { type: string }
 details:
 type: array
 items:
 type: object
 properties:
 field: { type: string }
 issue: { type: string }
 value: { type: string }
 doc_url: { type: string }

webhooks:
 planProposed:
 post:
 summary: plan.proposed, a plan was certified and proposed to the customer
 requestBody:
 content:
 application/json:
 schema:
 type: object
 properties:
 event_id: { type: string }
 type: { type: string, enum: [plan.proposed] }
 created_at: { type: string, format: date-time }
 api_version: { type: string }
 data:
 type: object
 properties:
 plan_id: { type: string }
 customer_id: { type: string }
 issue_type: { type: string }
 option_count: { type: integer }
 certificate_id: { type: string }
 responses:
 '2XX': { description: Acknowledged by subscriber }
 executionCompleted:
 post:
 summary: execution.completed, bank rail finished executing an approved option
 requestBody:
 content:
 application/json:
 schema:
 type: object
 properties:
 event_id: { type: string }
 type: { type: string, enum: [execution.completed] }
 created_at: { type: string, format: date-time }
 api_version: { type: string }
 data: { $ref: '#/components/schemas/Execution' }
 responses:
 '2XX': { description: Acknowledged by subscriber }
